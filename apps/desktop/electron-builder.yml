appId: dev.minopencil.app
productName: MinoPencil
copyright: Copyright (c) 2024-2026 MinoPencil contributors

directories:
  output: out/release
  buildResources: apps/desktop/build

files:
  - package.json
  - out/desktop/**/*
  - '!**/node_modules/**'
  - '!**/.git/**'

extraResources:
  - from: out/web/server
    to: server
  - from: out/web/public
    to: public
  # MCP server & CLI removed in MinoPencil fork

mac:
  category: public.app-category.graphics-design
  icon: apps/desktop/build/icon.icns
  artifactName: '${productName}-${version}-${arch}-mac.${ext}'
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

dmg:
  title: '${productName} ${version}'

win:
  icon: apps/desktop/build/icon.ico
  artifactName: '${productName}-${version}-${arch}-win.${ext}'
  target:
    - nsis
    - portable

nsis:
  artifactName: '${productName}-${version}-${arch}-win-setup.${ext}'
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: apps/desktop/build/icon.png
  category: Graphics
  artifactName: '${productName}-${version}-${arch}-linux.${ext}'
  desktop:
    entry: |
      [Desktop Entry]
      Name=MinoPencil
      Exec=AppRun --no-sandbox %U
      Terminal=false
      Type=Application
      Icon=minopencil
      StartupWMClass=minopencil
      Categories=Graphics;
      MimeType=application/x-minopencil;
  target:
    - AppImage
    - deb

fileAssociations:
  - ext: op
    name: MinoPencil Document
    description: MinoPencil Design File
    mimeType: application/x-minopencil
    role: Editor
    icon: apps/desktop/build/icon

asar: true
